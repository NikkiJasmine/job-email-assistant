name: Story Scout AI (Daily)

on:
  schedule:
    # 07:00 UTC daily -- adjust to taste for what counts as "morning" in your timezone.
    - cron: "0 7 * * *"
  workflow_dispatch: {}

concurrency:
  group: story-scout-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Story Scout AI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_STORY_DATABASE_ID: ${{ vars.NOTION_STORY_DATABASE_ID }}
        run: python -m src.story_scout.main
