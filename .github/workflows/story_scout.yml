name: Story Scout AI (Every 3 Days)

on:
  schedule:
    # 13:00 UTC, day-of-month 1/4/7/10/... -- an approximation of "every 3
    # days" (GitHub Actions cron has no native N-day interval); the gap is
    # occasionally shorter across a month boundary, which is fine for a
    # content-ideation digest. Adjust the hour to taste.
    - cron: "0 13 */3 * *"
  workflow_dispatch: {}

concurrency:
  group: story-scout
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Story Scout AI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_STORY_DATABASE_ID: ${{ vars.NOTION_STORY_DATABASE_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          STORY_SCOUT_NOTIFY_EMAIL: ${{ vars.STORY_SCOUT_NOTIFY_EMAIL }}
          STORY_SCOUT_RECIPIENT_NAME: ${{ vars.STORY_SCOUT_RECIPIENT_NAME }}
          STORY_SCOUT_TOP_N: ${{ vars.STORY_SCOUT_TOP_N }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python -m src.story_scout.main
