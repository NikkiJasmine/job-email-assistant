name: Hourly Job Email Assistant

on:
  schedule:
    # GitHub Actions cron always runs in UTC -- there's no timezone option.
    # 06:00 UTC = 08:00 in Stockholm during CEST (late Mar-late Oct). Once
    # Stockholm falls back to CET (UTC+1) for winter, this runs at 07:00
    # local instead of 08:00 -- a ~1hr seasonal drift inherent to fixed-UTC
    # cron. Adjust the hour twice a year around the DST changeovers if exact
    # 8am year-round matters, or split into two cron lines gated by month.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

concurrency:
  group: hourly-email-check
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job email assistant
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATA_SOURCE_ID: ${{ vars.NOTION_DATA_SOURCE_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          MAX_EMAILS_PER_RUN: ${{ vars.MAX_EMAILS_PER_RUN }}
        run: python -m src.job_assistant.main
